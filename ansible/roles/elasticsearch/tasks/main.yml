- name: Create certs directory
  file:
    path: "{{ project_dir }}/certs"
    state: directory
    mode: '0777'

- name: Check if certificates exist
  stat:
    path: "{{ project_dir }}/certs/elastic-stack-ca.p12"
  register: ca_stat

- name: Generate certificates
  command: >
    docker run --rm -v {{ project_dir }}/certs:/certs
    docker.elastic.co/elasticsearch/elasticsearch:{{ es_version }}
    bash -c "bin/elasticsearch-certutil ca --out /certs/elastic-stack-ca.p12 --pass '' &&
    bin/elasticsearch-certutil cert --name instances --ca /certs/elastic-stack-ca.p12 --ca-pass '' --out /certs/instances.p12 --pass ''"
  when: not ca_stat.stat.exists

- name: Set vm.max_map_count
  sysctl:
    name: vm.max_map_count
    value: '262144'
    state: present
    reload: yes

- name: Render docker-compose-es.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ project_dir }}/docker-compose-es.yml"

- name: Start Elasticsearch Cluster
  community.docker.docker_compose_v2:
    project_src: "{{ project_dir }}"
    files:
      - docker-compose-es.yml
    state: present
    wait: yes

- name: Wait for Elasticsearch API
  uri:
    url: "https://localhost:9200/_cluster/health"
    method: GET
    user: elastic
    password: "{{ es_password }}"
    force_basic_auth: yes
    validate_certs: false
    status_code: 200
  register: result
  until: result.status == 200 and (result.json.status == "green" or result.json.status == "yellow")
  retries: 30
  delay: 10
