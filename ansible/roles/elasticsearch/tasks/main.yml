- name: Ensure project directory exists
  file:
    path: "{{ project_dir }}"
    state: directory
    mode: '0755'

- name: Set vm.max_map_count
  sysctl:
    name: vm.max_map_count
    value: '262144'
    state: present
    reload: yes

- name: Render docker-compose template
  template:
    src: docker-compose.yml.j2
    dest: "{{ project_dir }}/docker-compose.yml"

- name: Start Elasticsearch Cluster
  community.docker.docker_compose_v2:
    project_src: "{{ project_dir }}"
    state: present
    wait: yes  
  register: compose_output

- name: Wait for Elasticsearch API to be ready
  uri:
    url: "http://localhost:9200/_cluster/health"
    status_code: 200
  register: result
  until: >
    result.status == 200 and 
    (result.json.status == "green" or result.json.status == "yellow")
  retries: 30
  delay: 10
